<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>中国高校实体清单</title>
    <meta
      name="description"
      content="可搜索的中国高校及类似机构美国 BIS 实体清单汇总，基于 EAR 第744部分补编第4号筛选。"
    />
    <meta
      name="keywords"
      content="BIS 实体清单, 中国高校, EAR 第744部分补编第4号, 出口管制, 高校实体清单"
    />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="index-zh.html" />
    <link rel="alternate" hreflang="en" href="index.html" />
    <link rel="alternate" hreflang="zh-CN" href="index-zh.html" />
    <link rel="alternate" hreflang="x-default" href="index.html" />
    <script id="structured-data" type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "CollectionPage",
        "name": "中国高校实体清单",
        "inLanguage": "zh-CN",
        "mainEntity": {
          "@type": "ItemList",
          "name": "中国高校实体清单",
          "numberOfItems": 0,
          "itemListElement": []
        }
      }
    </script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f1e8;
        --panel: #fffdf8;
        --ink: #1f2933;
        --muted: #5b6670;
        --line: #d9d0c1;
        --accent: #9b3d2f;
        --highlight: #ffe08a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--ink);
        background:
          radial-gradient(
            circle at top left,
            rgba(166, 60, 47, 0.12),
            transparent 30%
          ),
          linear-gradient(180deg, #efe7d6 0%, var(--bg) 100%);
      }

      main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 40px 20px 56px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 4vw, 3.4rem);
        line-height: 1;
        letter-spacing: -0.03em;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      a {
        color: var(--accent);
      }

      .panel {
        margin-top: 28px;
        padding: 20px;
        background: rgba(255, 253, 248, 0.92);
        border: 1px solid var(--line);
        border-radius: 18px;
        box-shadow: 0 20px 60px rgba(31, 41, 51, 0.08);
        backdrop-filter: blur(10px);
      }

      .page-top {
        display: flex;
        gap: 16px;
        align-items: flex-start;
        justify-content: space-between;
        flex-wrap: wrap;
      }

      .lang-switch {
        display: inline-flex;
        gap: 6px;
        padding: 6px;
        background: rgba(255, 253, 248, 0.92);
        border: 1px solid var(--line);
        border-radius: 999px;
      }

      .lang-switch a {
        padding: 8px 14px;
        border-radius: 999px;
        color: var(--muted);
        text-decoration: none;
      }

      .lang-switch a.active {
        background: var(--accent);
        color: #fff;
      }

      .noscript-note {
        margin-bottom: 20px;
        padding: 14px 16px;
        background: #fff7eb;
        border: 1px solid var(--line);
        border-radius: 14px;
        color: var(--muted);
      }

      .toolbar {
        display: flex;
        gap: 16px;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        margin-bottom: 18px;
      }

      .search {
        width: min(420px, 100%);
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
        color: var(--ink);
        font: inherit;
      }

      .count {
        font-size: 0.95rem;
        color: var(--muted);
      }

      .status {
        margin-bottom: 14px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      footer {
        margin-top: 18px;
        color: var(--muted);
      }

      footer small {
        display: inline-block;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: var(--panel);
        overflow: hidden;
        border-radius: 14px;
      }

      th,
      td {
        padding: 14px 16px;
        text-align: left;
        vertical-align: top;
        border-bottom: 1px solid var(--line);
      }

      th {
        font-size: 0.82rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      tbody tr:last-child td {
        border-bottom: 0;
      }

      .name {
        width: 28%;
        font-weight: 700;
      }

      .raw {
        color: var(--muted);
        line-height: 1.5;
      }

      .search-meta {
        display: none;
      }

      mark {
        background: var(--highlight);
        padding: 0 0.1em;
        border-radius: 0.2em;
      }

      @media (max-width: 720px) {
        .page-top {
          flex-direction: column;
        }

        th:nth-child(2),
        td:nth-child(2) {
          display: none;
        }

        .name {
          width: auto;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <noscript>
        <div class="noscript-note">
          当前页面的搜索功能依赖 JavaScript，但你仍然可以查看页面说明并切换语言：
          <a href="index.html">English</a>。
        </div>
      </noscript>

      <div class="page-top">
        <div>
          <h1>中国高校实体清单</h1>
          <p>
            基于美国 BIS《
            <a
              href="https://www.bis.gov/regulations/ear/744#supplement-4-744"
              target="_blank"
              rel="noreferrer"
              >EAR 第744部分补编第4号</a
            >》筛选。
          </p>
        </div>

        <nav class="lang-switch" aria-label="Language switcher">
          <a href="index.html" data-lang-link="en">English</a>
          <a
            class="active"
            href="index-zh.html"
            data-lang-link="zh"
            aria-current="page"
            >中文</a
          >
        </nav>
      </div>

      <section class="panel">
        <div class="toolbar">
          <input class="search" placeholder="搜索名称或详情" aria-label="搜索" />
          <div class="count"><span id="count">0</span> 条结果</div>
        </div>

        <div id="status" class="status">正在加载数据...</div>

        <div id="entities">
          <table>
            <thead>
              <tr>
                <th>名称</th>
                <th>详情</th>
              </tr>
            </thead>
            <tbody class="list"></tbody>
          </table>
        </div>

        <footer>
          <small id="generated-at"></small>
        </footer>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/list.js@2.3.1/dist/list.min.js"></script>
    <script>
      var PAGE = {
        lang: "zh",
        alternatePath: "index.html",
        pageTitle: "中国高校实体清单",
        generatedAtLabel: "爬取日期",
        loadingText: "正在加载数据...",
        loadErrorText: "无法加载多语言数据，请通过本地 HTTP 服务打开页面。",
      };

      var state = {
        rows: [],
        list: null,
        generatedAt: null,
      };

      function getPreferredLanguage() {
        try {
          var value = localStorage.getItem("preferred-language");
          return value === "en" || value === "zh" ? value : null;
        } catch (error) {
          return null;
        }
      }

      function savePreferredLanguage(lang) {
        try {
          localStorage.setItem("preferred-language", lang);
        } catch (error) {}
      }

      function maybeRedirectToPreferredLanguage() {
        var preferred = getPreferredLanguage();
        if (!preferred || preferred === PAGE.lang) {
          return;
        }

        var target = PAGE.alternatePath;
        if (location.pathname.endsWith("/" + target) || location.pathname === target) {
          return;
        }

        location.replace(target);
      }

      maybeRedirectToPreferredLanguage();

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, function (char) {
          return {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;",
          }[char];
        });
      }

      function highlight(value, query) {
        var escaped = escapeHtml(value);
        if (!query) {
          return escaped;
        }

        var pattern = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        return escaped.replace(
          new RegExp("(" + pattern + ")", "ig"),
          "<mark>$1</mark>",
        );
      }

      function updateCount() {
        document.getElementById("count").textContent =
          state.list.visibleItems.length;
      }

      function updateGeneratedAt() {
        var value = state.generatedAt ? new Date(state.generatedAt) : new Date();
        var formatted = isNaN(value.getTime())
          ? String(state.generatedAt || "")
          : value.toLocaleString("zh-CN", {
              year: "numeric",
              month: "2-digit",
              day: "2-digit",
              hour: "2-digit",
              minute: "2-digit",
              second: "2-digit",
            });

        document.getElementById("generated-at").textContent =
          PAGE.generatedAtLabel + ": " + formatted;
      }

      function updateStructuredData() {
        var node = document.getElementById("structured-data");
        if (!node) {
          return;
        }

        var itemListElement = state.rows.map(function (row, index) {
          return {
            "@type": "ListItem",
            position: index + 1,
            item: {
              "@type": "CollegeOrUniversity",
              name: row.nameZh || row.nameEn,
              alternateName: row.nameZh ? row.nameEn : undefined,
              description: row.raw,
            },
          };
        });

        node.textContent = JSON.stringify(
          {
            "@context": "https://schema.org",
            "@type": "CollectionPage",
            name: PAGE.pageTitle,
            inLanguage: "zh-CN",
            mainEntity: {
              "@type": "ItemList",
              name: PAGE.pageTitle,
              numberOfItems: itemListElement.length,
              itemListElement: itemListElement,
            },
          },
          null,
          2,
        );
      }

      function renderRows() {
        var query = document.querySelector(".search").value.trim();
        state.list.visibleItems.forEach(function (entry) {
          var index = Number(entry.values().rowIndex);
          var row = state.rows[index];
          var displayName = row.nameZh || row.nameEn;
          entry.elm.querySelector(".nameDisplay").innerHTML = highlight(
            displayName,
            query,
          );
          entry.elm.querySelector(".detailsDisplay").innerHTML = highlight(
            row.raw,
            query,
          );
        });
      }

      async function fetchJson(path) {
        var response = await fetch(path);
        if (!response.ok) {
          throw new Error("Failed to fetch " + path);
        }
        return response.json();
      }

      async function loadData() {
        var results = await Promise.all([
          fetchJson("data.json"),
          fetchJson("data-cn.json"),
        ]);
        var englishData = results[0];
        var chineseRows = results[1];
        var englishRows = Array.isArray(englishData)
          ? englishData
          : englishData.entries || [];
        var chineseMap = new Map(
          chineseRows.map(function (item) {
            return [item.name, item.zh];
          }),
        );

        return {
          generatedAt: Array.isArray(englishData)
            ? null
            : englishData.generatedAt || null,
          rows: englishRows.map(function (item) {
            return {
              nameEn: item.name,
              nameZh: chineseMap.get(item.name) || "",
              raw: item.raw,
            };
          }),
        };
      }

      async function main() {
        var status = document.getElementById("status");
        var input = document.querySelector(".search");

        document.querySelectorAll("[data-lang-link]").forEach(function (link) {
          link.addEventListener("click", function () {
            savePreferredLanguage(link.getAttribute("data-lang-link"));
          });
        });

        status.textContent = PAGE.loadingText;

        try {
          var data = await loadData();
          state.rows = data.rows;
          state.generatedAt = data.generatedAt;
          status.textContent = "";
          updateGeneratedAt();
          updateStructuredData();

          state.list = new List("entities", {
            valueNames: ["rowIndex", "nameEn", "nameZh", "rawSearch"],
            searchColumns: ["nameEn", "nameZh", "rawSearch"],
            item: '<tr><td class="name"><span class="nameDisplay"></span><span class="rowIndex search-meta"></span><span class="nameEn search-meta"></span><span class="nameZh search-meta"></span></td><td class="raw"><span class="detailsDisplay"></span><span class="rawSearch search-meta"></span></td></tr>',
          });

          state.list.add(
            state.rows.map(function (row, index) {
              return {
                rowIndex: String(index),
                nameEn: row.nameEn,
                nameZh: row.nameZh,
                rawSearch: row.raw,
              };
            }),
          );

          input.addEventListener("input", function () {
            state.list.search(input.value);
          });

          state.list.on("updated", function () {
            updateCount();
            renderRows();
          });

          updateCount();
          renderRows();
        } catch (error) {
          status.textContent = PAGE.loadErrorText;
        }
      }

      main();
    </script>
  </body>
</html>
