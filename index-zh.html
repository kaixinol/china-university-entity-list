<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>中国高校实体清单</title>
    <meta
      name="description"
      content="可搜索的中国高校及类似机构美国 BIS 实体清单汇总，基于 EAR 第744部分补编第4号筛选。"
    />
    <meta
      name="keywords"
      content="BIS 实体清单, 中国高校, EAR 第744部分补编第4号, 出口管制, 高校实体清单"
    />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="index-zh.html" />
    <link rel="alternate" hreflang="en" href="index.html" />
    <link rel="alternate" hreflang="zh-CN" href="index-zh.html" />
    <link rel="alternate" hreflang="x-default" href="index.html" />
    <script id="structured-data" type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "CollectionPage",
        "name": "中国高校实体清单",
        "inLanguage": "zh-CN",
        "mainEntity": {
          "@type": "ItemList",
          "name": "中国高校实体清单",
          "numberOfItems": 0,
          "itemListElement": []
        }
      }
    </script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f1e8;
        --panel: #fffdf8;
        --ink: #1f2933;
        --muted: #5b6670;
        --line: #d9d0c1;
        --accent: #9b3d2f;
        --highlight: #ffe08a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--ink);
        background:
          radial-gradient(
            circle at top left,
            rgba(166, 60, 47, 0.12),
            transparent 30%
          ),
          linear-gradient(180deg, #efe7d6 0%, var(--bg) 100%);
      }

      main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 40px 20px 56px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 4vw, 3.4rem);
        line-height: 1;
        letter-spacing: -0.03em;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      a {
        color: var(--accent);
      }

      .panel {
        margin-top: 28px;
        padding: 20px;
        background: rgba(255, 253, 248, 0.92);
        border: 1px solid var(--line);
        border-radius: 18px;
        box-shadow: 0 20px 60px rgba(31, 41, 51, 0.08);
        backdrop-filter: blur(10px);
      }

      .page-top {
        display: flex;
        gap: 16px;
        align-items: flex-start;
        justify-content: space-between;
        flex-wrap: wrap;
      }

      .lang-switch {
        display: inline-flex;
        gap: 6px;
        padding: 6px;
        background: rgba(255, 253, 248, 0.92);
        border: 1px solid var(--line);
        border-radius: 999px;
      }

      .lang-switch a {
        padding: 8px 14px;
        border-radius: 999px;
        color: var(--muted);
        text-decoration: none;
      }

      .lang-switch a.active {
        background: var(--accent);
        color: #fff;
      }

      .noscript-note {
        margin-bottom: 20px;
        padding: 14px 16px;
        background: #fff7eb;
        border: 1px solid var(--line);
        border-radius: 14px;
        color: var(--muted);
      }

      .toolbar {
        display: flex;
        gap: 16px;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        margin-bottom: 18px;
      }

      .search {
        width: min(420px, 100%);
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
        color: var(--ink);
        font: inherit;
      }

      .count {
        font-size: 0.95rem;
        color: var(--muted);
      }

      .status {
        margin-bottom: 14px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      footer {
        margin-top: 18px;
        color: var(--muted);
      }

      footer small {
        display: inline-block;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: var(--panel);
        overflow: hidden;
        border-radius: 14px;
      }

      th,
      td {
        padding: 14px 16px;
        text-align: left;
        vertical-align: top;
        border-bottom: 1px solid var(--line);
      }

      th {
        font-size: 0.82rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      tbody tr:last-child td {
        border-bottom: 0;
      }

      .name {
        width: 28%;
        font-weight: 700;
      }

      .raw {
        color: var(--muted);
        line-height: 1.5;
      }

      .search-meta {
        display: none;
      }

      mark {
        background: var(--highlight);
        padding: 0 0.1em;
        border-radius: 0.2em;
      }

      @media (max-width: 720px) {
        .page-top {
          flex-direction: column;
        }

        th:nth-child(2),
        td:nth-child(2) {
          display: none;
        }

        .name {
          width: auto;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <noscript>
        <div class="noscript-note">
          当前页面的搜索功能依赖 JavaScript，但你仍然可以查看页面说明并切换语言：
          <a href="index.html">English</a>。
        </div>
      </noscript>

      <div class="page-top">
        <div>
          <h1>中国高校实体清单</h1>
          <p>
            基于美国 BIS《
            <a
              href="https://www.bis.gov/regulations/ear/744#supplement-4-744"
              target="_blank"
              rel="noreferrer"
              >EAR 第744部分补编第4号</a
            >》筛选。
          </p>
        </div>

        <nav class="lang-switch" aria-label="Language switcher">
          <a href="index.html" data-lang-link="en">English</a>
          <a
            class="active"
            href="index-zh.html"
            data-lang-link="zh"
            aria-current="page"
            >中文</a
          >
        </nav>
      </div>

      <section class="panel">
        <div class="toolbar">
          <input class="search" placeholder="搜索名称或详情" aria-label="搜索" />
          <div class="count"><span id="count">0</span> 条结果</div>
        </div>

        <div id="status" class="status">正在加载数据...</div>

        <div id="entities">
          <table>
            <thead>
              <tr>
                <th>名称</th>
                <th>详情</th>
              </tr>
            </thead>
            <tbody class="list"></tbody>
          </table>
        </div>

        <footer>
          <small id="generated-at"></small>
        </footer>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/list.js@2.3.1/dist/list.min.js"></script>
    <script>
      const PAGE = {
        lang: "zh",
        alternatePath: "index.html",
        pageTitle: "中国高校实体清单",
        generatedAtLabel: "爬取日期",
        loadingText: "正在加载数据...",
        loadErrorText: "无法加载多语言数据，请通过本地 HTTP 服务打开页面。",
      };

      const state = {
        rows: [],
        list: null,
        generatedAt: null,
      };

      // Language preference handling
      function getPreferredLanguage() {
        try {
          const value = localStorage.getItem("preferred-language");
          return ["en", "zh"].includes(value) ? value : null;
        } catch {
          return null;
        }
      }

      function savePreferredLanguage(lang) {
        try {
          localStorage.setItem("preferred-language", lang);
        } catch {}
      }

      function maybeRedirectToPreferredLanguage() {
        const preferred = getPreferredLanguage();
        if (!preferred || preferred === PAGE.lang) return;

        const target = PAGE.alternatePath;
        if (location.pathname.endsWith("/" + target) || location.pathname === target) return;

        location.replace(target);
      }

      maybeRedirectToPreferredLanguage();

      // HTML utilities
      const escapeHtml = (str) => 
        String(str).replace(/[&<>"']/g, (char) => 
          ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[char]
        );

      const highlight = (value, query) => {
        const escaped = escapeHtml(value);
        if (!query) return escaped;
        
        const pattern = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        return escaped.replace(new RegExp(`(${pattern})`, "ig"), "<mark>$1</mark>");
      };

      // UI updates
      const updateCount = () => {
        document.getElementById("count").textContent = state.list?.visibleItems.length || 0;
      };

      const updateGeneratedAt = () => {
        const date = state.generatedAt ? new Date(state.generatedAt) : new Date();
        const formatted = isNaN(date.getTime()) 
          ? String(state.generatedAt || "")
          : date.toLocaleString("zh-CN", {
              year: "numeric",
              month: "2-digit",
              day: "2-digit",
              hour: "2-digit",
              minute: "2-digit",
              second: "2-digit",
            });

        document.getElementById("generated-at").textContent = `${PAGE.generatedAtLabel}: ${formatted}`;
      };

      const updateStructuredData = () => {
        const node = document.getElementById("structured-data");
        if (!node) return;

        const itemListElement = state.rows.map((row, index) => ({
          "@type": "ListItem",
          position: index + 1,
          item: {
            "@type": "CollegeOrUniversity",
            name: row.nameZh || row.nameEn,
            alternateName: row.nameZh ? row.nameEn : undefined,
            description: row.raw,
          },
        }));

        node.textContent = JSON.stringify({
          "@context": "https://schema.org",
          "@type": "CollectionPage",
          name: PAGE.pageTitle,
          inLanguage: "zh-CN",
          mainEntity: {
            "@type": "ItemList",
            name: PAGE.pageTitle,
            numberOfItems: itemListElement.length,
            itemListElement,
          },
        }, null, 2);
      };

      const renderRows = () => {
        const query = document.querySelector(".search")?.value.trim() || "";
        state.list?.visibleItems.forEach(entry => {
          const index = Number(entry.values().rowIndex);
          const row = state.rows[index];
          const displayName = row.nameZh || row.nameEn;
          entry.elm.querySelector(".nameDisplay").innerHTML = highlight(displayName, query);
          entry.elm.querySelector(".detailsDisplay").innerHTML = highlight(row.raw, query);
        });
      };

      // Data loading
      const fetchJson = async (path) => {
        const response = await fetch(path);
        if (!response.ok) throw new Error(`Failed to fetch ${path}`);
        return response.json();
      };

      const loadData = async () => {
        const [englishData, chineseRows] = await Promise.all([
          fetchJson("data.json"),
          fetchJson("data-cn.json"),
        ]);
        
        const englishRows = Array.isArray(englishData) 
          ? englishData 
          : englishData.entries || [];
          
        const chineseMap = new Map(chineseRows.map(item => [item.name, item.zh]));

        return {
          generatedAt: Array.isArray(englishData) 
            ? null 
            : englishData.generatedAt || null,
          rows: englishRows.map(item => ({
            nameEn: item.name,
            nameZh: chineseMap.get(item.name) || "",
            raw: item.raw,
          })),
        };
      };

      // Main initialization
      const main = async () => {
        const status = document.getElementById("status");
        const input = document.querySelector(".search");

        document.querySelectorAll("[data-lang-link]").forEach(link => {
          link.addEventListener("click", () => {
            savePreferredLanguage(link.getAttribute("data-lang-link"));
          });
        });

        status.textContent = PAGE.loadingText;

        try {
          const data = await loadData();
          Object.assign(state, { rows: data.rows, generatedAt: data.generatedAt });
          
          status.textContent = "";
          updateGeneratedAt();
          updateStructuredData();

          state.list = new List("entities", {
            valueNames: ["rowIndex", "nameEn", "nameZh", "rawSearch"],
            searchColumns: ["nameEn", "nameZh", "rawSearch"],
            item: '<tr><td class="name"><span class="nameDisplay"></span><span class="rowIndex search-meta"></span><span class="nameEn search-meta"></span><span class="nameZh search-meta"></span></td><td class="raw"><span class="detailsDisplay"></span><span class="rawSearch search-meta"></span></td></tr>',
          });

          state.list.add(state.rows.map((row, index) => ({
            rowIndex: String(index),
            nameEn: row.nameEn,
            nameZh: row.nameZh,
            rawSearch: row.raw,
          })));

          input?.addEventListener("input", (e) => state.list.search(e.target.value));
          state.list.on("updated", () => {
            updateCount();
            renderRows();
          });

          updateCount();
          renderRows();
        } catch (error) {
          status.textContent = PAGE.loadErrorText;
        }
      };

      main();
    </script>
  </body>
</html>
